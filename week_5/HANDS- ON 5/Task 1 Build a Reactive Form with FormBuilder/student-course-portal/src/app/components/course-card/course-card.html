<div class="course-card" appHighlight="lightblue" [ngClass]="cardClasses" [ngStyle]="statusBorderStyle">
  <div class="card-header">
    <span class="course-id">Course ID: {{ course.id }}</span>
    <h3>{{ course.name }}</h3>
  </div>
  <p class="course-code">Code: {{ course.code }}</p>
  <p class="course-credits">{{ course.credits | creditLabel }}</p>

  <span [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge-passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge-failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge-pending">Pending</span>
  </span>

  <div class="card-actions">
    <button class="enroll-btn" (click)="onEnrollClick()">Enroll Now</button>
    <button class="details-btn" (click)="toggleExpanded()">Show Details</button>
  </div>

  <div class="details" *ngIf="isExpanded">
    <p>Additional details about {{ course.name }} go here.</p>
  </div>
</div>
