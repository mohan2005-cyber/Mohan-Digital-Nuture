<h1>{{ portalName }}</h1>

<p>Manage your courses, track grades, and stay updated with your academic progress.</p>

<div class="stats-row">
  <span>Courses Available: 12</span>
  <span>Enrolled: 3</span>
  <span>GPA: 3.8</span>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>

<p *ngIf="message">{{ message }}</p>

<input [(ngModel)]="searchTerm" placeholder="Search courses...">
<p>Searching for: {{ searchTerm }}</p>
