spring.application.name=orm-learn
# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=gowtham@30

# Hibernate configuration
#validate: Checks if the database schema matches Java entities and halts application startup if any mismatches are found.
# none: Disables all schema management, making no validation checks or structural modifications to the database.
# update: Updates the database structure by adding new tables or columns without modifying or deleting existing data.
# create: Drops existing tables and recreates a fresh, empty schema every time the application starts up.
# create-drop: Creates the database schema at startup and completely destroys it when the application shuts down.

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081