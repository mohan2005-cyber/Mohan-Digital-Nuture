<div class="course-list-container">

  <h2>Course List</h2>

  <!-- Search using query parameter -->
  <div class="course-search">

    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Search courses">

    <button (click)="onSearch()">
      Search
    </button>

  </div>

  <button
    class="add-course-btn"
    (click)="addNewCourse()">
    + Add Test Course
  </button>

  <p *ngIf="isLoading">
    Loading courses...
  </p>

  <ng-container *ngIf="!isLoading">

    <div
      class="course-grid"
      *ngIf="filteredCourses.length > 0; else noCourses">

      <app-course-card
        *ngFor="
          let course of filteredCourses;
          let i = index;
          trackBy: trackByCourseId
        "
        [course]="course"
        (enrollRequested)="onEnroll($event)">
      </app-course-card>

    </div>

    <ng-template #noCourses>
      <p>No courses available.</p>
    </ng-template>

  </ng-container>

  <p
    class="selected-msg"
    *ngIf="selectedCourseId">
    Selected course ID: {{ selectedCourseId }}
  </p>

</div>
